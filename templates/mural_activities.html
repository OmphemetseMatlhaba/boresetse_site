<!-- templates/mural_activities.html -->
{% extends "base.html" %}

{% block content %}
<div class="relative min-h-screen">
  <!-- Subtle Background Pattern -->
  <div class="absolute inset-0 opacity-5">
    <div class="absolute top-20 left-10 w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-xl"></div>
    <div class="absolute top-40 right-10 w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-xl"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-200 rounded-full mix-blend-multiply filter blur-xl"></div>
  </div>

  <div class="relative max-w-7xl mx-auto px-6 py-40">
    <!-- Header Section -->
    <div class="text-center mb-20">
     
      <p class="text-sm uppercase tracking-[0.35em] text-blue-600 mb-4">Mural Activities</p>
      <h1 class="text-4xl font-bold text-slate-900 mb-6">Sports and recreational activities for our students</h1>
    </div>

    <!-- Activities Grid -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      {% for activity in activities %}
      <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-all duration-300" data-aos="fade-up">
        <!-- Image Section with Title Overlay -->
        <div class="relative overflow-hidden h-64">
          <img src="{{ activity.image.url }}" alt="{{ activity.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
          <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
          
          <!-- Title Overlay -->
          <div class="absolute bottom-0 left-0 right-0 p-4">
            <h3 class="text-xl font-bold text-white">{{ activity.title }}</h3>
          </div>
        </div>
      </div>
      {% empty %}
      <div class="col-span-full text-center py-16">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-slate-100 rounded-full mb-6">
          <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
        </div>
        <h3 class="text-2xl font-bold text-slate-900 mb-2">No Activities Yet</h3>
        <p class="text-slate-600">Check back soon for upcoming mural activities and projects.</p>
      </div>
      {% endfor %}
    </div>

   
</div>
{% endblock %}
