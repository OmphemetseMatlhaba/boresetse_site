  <!-- templates/components/principal.html -->

<section class="py-20">
  <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-10 items-center">

    <!-- Image -->
    <div data-aos="fade-right">
      <img src="{{ principal.image.url }}" 
           class="rounded-2xl shadow-lg w-full object-cover">
    </div>

    <!-- Message -->
    <div data-aos="fade-left">
      <h2 class="text-3xl font-semibold text-blue-900 mb-4">
        Welcome Message
      </h2>
      <p class="text-base text-gray-700 leading-relaxed mb-6">
        "{{ principal.message }}"
      </p>
      <div class="mt-4">
        <h3 class="font-semibold text-lg text-blue-900">
          {{ principal.name }}
        </h3>
        <p class="text-yellow-500 font-medium">
          {{ principal.title }}
        </p>
      </div>
    </div>

  </div>
</section>
