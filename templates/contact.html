<!-- templates/contact.html -->
{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-40">
  <div class="text-center mb-16">
    <p class="text-sm uppercase tracking-[0.35em] text-blue-600 mb-4">Get in Touch</p>
    <h3 class="text-2xl font-bold text-slate-900 mb-6">We'd love to hear from you. Send us a message and we'll respond as quickly as possible.</h3>
    <div class="line-accent mx-auto mt-8"></div>
  </div>

  <div class="card-lg p-8">
    <form method="post">
      {% csrf_token %}
      <div class="mb-6">
        <label class="block text-small font-semibold mb-3 text-gray-900">Full Name</label>
        <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>
      <div class="mb-6">
        <label class="block text-small font-semibold mb-3 text-gray-900">Email Address</label>
        <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>
      <div class="mb-8">
        <label class="block text-small font-semibold mb-3 text-gray-900">Message</label>
        <textarea name="message" rows="6" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none"></textarea>
      </div>
      <button type="submit" class="btn-primary w-full">Send Message</button>
    </form>
  </div>
</div>
{% endblock %}
