<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boresetse Secondary School</title>
  <favicon href="{% static 'images/favicon.ico' %}" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animations -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    }
    
    /* Premium Button Styles */
    .btn-primary {
      @apply inline-flex items-center justify-center px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-all duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2;
    }
    
    .btn-secondary {
      @apply inline-flex items-center justify-center px-6 py-3 bg-gray-200 text-gray-900 font-medium rounded-lg hover:bg-gray-300 transition-all duration-200 shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2;
    }
    
    .btn-text {
      @apply inline-flex items-center text-blue-600 font-medium hover:text-blue-700 transition-colors;
    }
    
    /* Premium Card Styles */
    .card {
      @apply bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-300 border border-gray-100;
    }
    
    .card-lg {
      @apply bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 border border-gray-100;
    }
    
    /* Premium Heading Styles */
    .heading-xl {
      @apply text-5xl font-light text-gray-900 tracking-tight;
    }
    
    .heading-lg {
      @apply text-4xl font-semibold text-gray-900 tracking-tight;
    }
    
    .heading-md {
      @apply text-3xl font-semibold text-gray-900;
    }
    
    .heading-sm {
      @apply text-xl font-semibold text-gray-900;
    }
    
    /* Text Styles */
    .text-lead {
      @apply text-lg text-gray-600 leading-relaxed;
    }
    
    .text-body {
      @apply text-base text-gray-700 leading-relaxed;
    }
    
    .text-small {
      @apply text-sm text-gray-600;
    }
    
    /* Subtle Decorative Line */
    .line-accent {
      @apply w-16 h-1 bg-gradient-to-r from-blue-500 to-purple-600;
    }
    
    /* Section Spacing */
    .section-spacing {
      @apply py-20;
    }
    
    /* Premium Input Styles */
    input, textarea, select {
      @apply w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all;
    }
  </style>
</head>

<body class="bg-gray-50">

  <!-- 🔥 WATERMARK LOGO -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
    <img src="https://i.ibb.co/W4cMmfmX/Boresetse-High-School.png" 
         alt="watermark"
         class="w-[600px] opacity-5 grayscale select-none">
  </div>

  <!-- Background Glow -->
<div class="absolute inset-0 opacity-10">

  <!-- Blue Glow -->
  <div class="absolute top-20 left-10 w-72 h-72 bg-blue-500 rounded-full blur-3xl"></div>

  <!-- Gold Glow -->
  <div class="absolute bottom-10 right-10 w-72 h-72 bg-yellow-400 rounded-full blur-3xl"></div>

</div>

{% include "components/navbar.html" %}

{% block content %}{% endblock %}

{% include "components/footer.html" %}

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 800,
    once: true,
    offset: 100
  });
</script>

</body>
</html>
